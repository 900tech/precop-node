name: 🛡️ PRECOP Sentinel Artifacts Forge

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forge_artifacts:
    name: 🔨 Build Universal Bastion (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: precop-node-linux
            asset_name: precop-node-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: precop-node-macos
            asset_name: precop-node-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: precop-node-win.exe
            asset_name: precop-node-win.exe

    steps:
      - name: 🛰️ Clone Gateway
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Install Toolchain (STRICT 1.81.0)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.81.0
          targets: ${{ matrix.target }}

      - name: 🛡️ Install Dependencies (Linux MUSL)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang llvm libssl-dev build-essential perl musl-tools

      - name: 🛡️ Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install nasm cmake strawberryperl
          echo "C:\Program Files\NASM" >> $GITHUB_PATH

      - name: 🔍 Pre-Forge Audit (Universal Shell)
        shell: bash
        working-directory: ./engine
        run: |
          echo "🔍 Checking Root..."
          ls -la
          echo "🔍 Checking Doc/RPC..."
          ls -la doc/rpc/ || echo "🚨 doc/rpc MISSING"

      - name: 🔨 Forge Sovereign Engine (STATIC MUSL)
        shell: bash
        working-directory: ./engine
        env:
          CC: clang
          CXX: clang++
          RUST_BACKTRACE: 1
        run: |
          # 🛡️ FORGE STATIQUE ET UNIVERSELLE
          cargo build --verbose --release --target ${{ matrix.target }} -p florestad -j 2
          
      - name: 📦 Prepare Binary (Universal Pack)
        shell: bash
        run: |
          # On standardise l'extension pour faciliter la détection
          EXT=""
          [[ "${{ matrix.os }}" == "windows-latest" ]] && EXT=".exe"
          
          mkdir -p bin/
          cp engine/target/${{ matrix.target }}/release/florestad${EXT} bin/${{ matrix.asset_name }}

      - name: 📦 Seal Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: 👸 Final Scellement - Sovereign Release
    needs: forge_artifacts
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Clone Gateway
        uses: actions/checkout@v4

      - name: 📥 Collect Artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: 🚀 Launch v1.0.1 Sentinel Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          tag_name: ${{ github.ref_name }}
          name: 🛡️ PRECOP Sentinel v1.0.1 - Sovereign Release Candidate
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
